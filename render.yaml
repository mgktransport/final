services:
  # Web Service (Application)
  - type: web
    name: mgk-transport
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mgk-transport-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: mgk-transport-db
          property: connectionString
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: mgk-transport
          property: url
      - key: NEXTAUTH_SECRET
        generateValue: true

  # PostgreSQL Database
  - type: psql
    name: mgk-transport-db
    region: oregon
    plan: free
    maxConnections: 20
    user: mgk_user
    database: mgk_transport
